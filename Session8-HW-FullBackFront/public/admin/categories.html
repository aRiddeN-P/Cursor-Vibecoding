<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>دسته‌بندی‌ها — پنل مدیریت دخلیار</title>
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
  <link rel="stylesheet" href="/admin/css/admin-base.css" />
  <link rel="stylesheet" href="/admin/css/admin-content.css" />
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar-brand">
        <img src="/img/logo.png" alt="دخلیار" />
        <span>دخلیار</span>
        <small>پنل مدیریت</small>
      </div>
      <nav class="admin-nav">
        <a href="/admin/dashboard.html" class="admin-nav-item" data-page="dashboard"><i class="ti ti-dashboard"></i> داشبورد</a>
        <a href="/admin/users.html" class="admin-nav-item" data-page="users"><i class="ti ti-users"></i> کاربران</a>
        <a href="/admin/messages.html" class="admin-nav-item" data-page="messages"><i class="ti ti-message"></i> پیام‌رسانی</a>
        <a href="/admin/recommendations.html" class="admin-nav-item" data-page="recommendations"><i class="ti ti-bulb"></i> پیشنهادات</a>
        <a href="/admin/stories.html" class="admin-nav-item" data-page="stories"><i class="ti ti-photo"></i> استوری‌ها</a>
        <a href="/admin/banners.html" class="admin-nav-item" data-page="banners"><i class="ti ti-ad"></i> بنرها</a>
        <a href="/admin/categories.html" class="admin-nav-item" data-page="categories"><i class="ti ti-tag"></i> دسته‌بندی‌ها</a>
        <div class="admin-nav-divider"></div>
        <a href="/admin/admins.html" class="admin-nav-item" data-page="admins" id="nav-admins"><i class="ti ti-shield"></i> مدیران</a>
        <a href="/admin/history.html" class="admin-nav-item admin-nav-sub" data-page="history" id="nav-history"><i class="ti ti-history"></i> تاریخچه</a>
      </nav>
      <div class="admin-sidebar-footer">
        <span id="admin-username-display"></span>
        <button type="button" id="btn-admin-logout">خروج</button>
      </div>
    </aside>
    <button type="button" class="admin-sidebar-toggle" id="sidebar-toggle"><i class="ti ti-menu-2"></i></button>
    <main class="admin-main" id="admin-main">
      <div class="admin-topbar"><h1 class="admin-page-title">دسته‌بندی‌ها</h1></div>
      <div class="admin-content admin-categories-grid">
        <section class="admin-card">
          <h2 class="admin-section-title">درخواست‌های دسته‌بندی</h2>
          <div class="admin-filter-pills" style="margin-bottom:12px">
            <button type="button" class="admin-filter-pill active" data-req-filter="all">همه</button>
            <button type="button" class="admin-filter-pill" data-req-filter="pending">در انتظار</button>
            <button type="button" class="admin-filter-pill" data-req-filter="approved">تایید شده</button>
            <button type="button" class="admin-filter-pill" data-req-filter="rejected">رد شده</button>
          </div>
          <div class="admin-content-table-wrap">
            <table class="admin-content-table">
              <thead>
                <tr>
                  <th>کاربر</th>
                  <th>پیش‌نمایش</th>
                  <th>آیکون</th>
                  <th>رنگ</th>
                  <th>نوع</th>
                  <th>تاریخ</th>
                  <th>وضعیت</th>
                  <th>عملیات</th>
                </tr>
              </thead>
              <tbody id="requests-tbody"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-card">
          <div class="admin-content-topbar" style="margin-bottom:12px">
            <h2 class="admin-section-title" style="margin:0">دسته‌بندی‌های پیش‌فرض</h2>
            <button type="button" class="admin-btn primary sm" id="btn-add-default">افزودن دسته پیش‌فرض</button>
          </div>
          <div class="admin-content-table-wrap">
            <table class="admin-content-table">
              <thead>
                <tr>
                  <th>آیکون</th>
                  <th>نام</th>
                  <th>رنگ</th>
                  <th>نوع</th>
                  <th>وضعیت</th>
                  <th>عملیات</th>
                </tr>
              </thead>
              <tbody id="defaults-tbody"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="admin-modal-overlay hidden" id="reject-modal" hidden>
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title">رد درخواست</h2>
        <button type="button" class="admin-modal-close" id="reject-modal-close">&times;</button>
      </div>
      <form id="reject-form">
        <div class="admin-form-row">
          <label for="reject-note">دلیل رد (اختیاری)</label>
          <textarea class="admin-input" id="reject-note" rows="3"></textarea>
        </div>
        <div class="admin-modal-actions">
          <button type="submit" class="admin-btn danger">رد درخواست</button>
          <button type="button" class="admin-btn secondary" id="reject-modal-cancel">انصراف</button>
        </div>
      </form>
    </div>
  </div>

  <div class="admin-modal-overlay hidden" id="default-modal" hidden>
    <div class="admin-modal">
      <div class="admin-modal-header">
        <h2 class="admin-modal-title" id="default-modal-title">افزودن دسته پیش‌فرض</h2>
        <button type="button" class="admin-modal-close" id="default-modal-close">&times;</button>
      </div>
      <form id="default-form">
        <div class="admin-form-row">
          <label for="def-name">نام</label>
          <input type="text" class="admin-input" id="def-name" maxlength="30" required />
        </div>
        <div class="admin-form-row">
          <label for="def-icon">آیکون (ایموجی)</label>
          <input type="text" class="admin-input" id="def-icon" maxlength="4" placeholder="🎯" />
        </div>
        <div class="admin-form-row">
          <label>رنگ</label>
          <div class="color-swatches" id="color-swatches"></div>
          <input type="color" class="admin-input" id="custom-color" value="#EF4444" style="margin-top:8px;width:100%;height:36px;padding:2px" />
        </div>
        <div class="admin-form-row">
          <label>پیش‌نمایش</label>
          <span class="category-preview-pill" id="default-preview-pill" style="background:#EF4444">📁 نام دسته</span>
        </div>
        <div class="admin-form-row">
          <label for="def-type">نوع</label>
          <select class="admin-input admin-select" id="def-type" required>
            <option value="expense">هزینه</option>
            <option value="income">درآمد</option>
            <option value="both">هر دو</option>
          </select>
        </div>
        <div class="admin-modal-actions">
          <button type="submit" class="admin-btn primary">ذخیره</button>
          <button type="button" class="admin-btn secondary" id="default-modal-cancel">انصراف</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/admin/js/admin-api.js"></script>
  <script src="/admin/js/admin-layout.js"></script>
  <script>initAdminLayout('categories');</script>
  <script src="/admin/js/admin-categories.js"></script>
</body>
</html>
