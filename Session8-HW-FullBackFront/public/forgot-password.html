<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>دخلیار — بازیابی رمز عبور</title>
  <link rel="icon" type="image/png" href="/img/logo.png" />
  <link rel="apple-touch-icon" href="/img/logo.png" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1A5C3A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="دخلیار" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/modal.css" />
  <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
</head>
<body>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <main class="page">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true"></div>
      <div class="brand-name">دخلیار</div>
    </div>

    <section class="card" aria-labelledby="fpTitle">
      <h1 id="fpTitle">بازیابی رمز عبور</h1>
      <p class="subtitle">برای بازیابی رمز عبور، ایمیل حساب خود را وارد کنید</p>

      <div class="stepper" aria-hidden="true">
        <div id="fp_dot1" class="step-dot active">۱</div>
        <div class="step-line"></div>
        <div id="fp_dot2" class="step-dot">۲</div>
        <div class="step-line"></div>
        <div id="fp_dot3" class="step-dot">۳</div>
      </div>

      <!-- ====================== Step 1: Email ====================== -->
      <section id="fp_step1" class="wizard-step active">
        <div class="field">
          <label for="fp_email">ایمیل</label>
          <input id="fp_email" type="email" class="input ltr" placeholder="you@example.com" autocomplete="email" />
          <div id="fp_emailError" class="error-text"></div>
        </div>

        <button id="fp_sendBtn" type="button" class="btn btn-primary">ارسال کد بازیابی</button>

        <p class="foot">
          <a href="/">بازگشت به صفحه ورود</a>
        </p>
      </section>

      <!-- ====================== Step 2: OTP ====================== -->
      <section id="fp_step2" class="wizard-step">
        <p class="muted center-text">
          کد ۶ رقمی به ایمیل <strong id="fp_emailHint" class="ltr" style="direction:ltr;display:inline-block;"></strong> ارسال شد.
        </p>

        <div id="fp_otpRow" class="otp-row" aria-label="کد تایید">
          <input class="otp-input" inputmode="numeric" maxlength="1" />
          <input class="otp-input" inputmode="numeric" maxlength="1" />
          <input class="otp-input" inputmode="numeric" maxlength="1" />
          <input class="otp-input" inputmode="numeric" maxlength="1" />
          <input class="otp-input" inputmode="numeric" maxlength="1" />
          <input class="otp-input" inputmode="numeric" maxlength="1" />
        </div>
        <div id="fp_otpError" class="error-text center-text"></div>

        <p class="countdown">زمان باقی‌مانده: <strong id="fp_countdown">۳:۰۰</strong></p>
        <div class="center-text">
          <button id="fp_resendBtn" type="button" class="btn-link" disabled>ارسال دوباره کد</button>
        </div>

        <div class="actions-row">
          <button id="fp_backBtn2" type="button" class="btn btn-ghost">بازگشت</button>
          <button id="fp_verifyBtn" type="button" class="btn btn-primary">تایید کد</button>
        </div>
      </section>

      <!-- ====================== Step 3: New password ====================== -->
      <section id="fp_step3" class="wizard-step">
        <div class="field">
          <label for="fp_pass">رمز عبور جدید</label>
          <div class="input-wrap">
            <input id="fp_pass" type="password" class="input" placeholder="رمز جدید" autocomplete="new-password" />
            <button type="button" class="toggle-pass" data-toggle="fp_pass">نمایش</button>
          </div>
          <div class="strength-bar" id="fp_strength">
            <span></span><span></span><span></span><span></span>
          </div>
          <ul class="checklist" id="fp_checklist">
            <li data-rule="length">حداقل ۸ کاراکتر</li>
            <li data-rule="upper">حداقل یک حرف بزرگ انگلیسی (A-Z)</li>
            <li data-rule="digit">حداقل یک عدد (0-9)</li>
            <li data-rule="special">حداقل یک کاراکتر خاص (!@#$%^&amp;*)</li>
          </ul>
        </div>

        <div class="field">
          <label for="fp_pass2">تکرار رمز عبور جدید</label>
          <div class="input-wrap">
            <input id="fp_pass2" type="password" class="input" placeholder="تکرار رمز جدید" autocomplete="new-password" />
            <button type="button" class="toggle-pass" data-toggle="fp_pass2">نمایش</button>
          </div>
          <div id="fp_matchIndicator" class="match-indicator"></div>
        </div>

        <div class="actions-row">
          <button id="fp_backBtn3" type="button" class="btn btn-ghost">بازگشت</button>
          <button id="fp_resetBtn" type="button" class="btn btn-primary">تغییر رمز عبور</button>
        </div>
      </section>
    </section>
  </main>

  <script src="/js/modal.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
